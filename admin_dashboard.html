<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        header {
            background-color: #333;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        main {
            padding: 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2rem;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th, td {
            padding: 1rem;
            text-align: left;
        }
        th {
            background-color: #333;
            color: white;
        }
        .logout-btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background-color: #f44336;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .logout-btn:hover {
            background-color: #d32f2f;
        }
        .form-section {
            margin-top: 2rem;
        }
        label {
            display: block;
            margin-top: 1rem;
        }
        textarea {
            width: 100%;
            height: 100px;
        }
        button {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome, Admin {{ username }}</h1>
    </header>
    <main>
        <h2>Team Proposals</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Team</th>
                    <th>Round</th>
                    <th>Proposal</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody>
                {% for proposal in proposals %}
                <tr>
                    <td>{{ proposal[0] }}</td>
                    <td>{{ proposal[1] }}</td>
                    <td>{{ proposal[2] }}</td>
                    <td>{{ proposal[3] }}</td>
                    <td>{{ proposal[4] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div class="form-section">
            <h2>Score and Provide Feedback</h2>
            <form action="/score_submission" method="POST">
                <label for="proposal_id">Proposal ID:</label>
                <input type="number" id="proposal_id" name="proposal_id" required>

                <label for="score">Score:</label>
                <input type="number" id="score" name="score" required min="0" max="100">

                <label for="feedback">Feedback:</label>
                <textarea id="feedback" name="feedback" required></textarea>

                <button type="submit">Submit</button>
            </form>
        </div>

        <a href="/logout" class="logout-btn">Logout</a>
    </main>
</body>
</html>
